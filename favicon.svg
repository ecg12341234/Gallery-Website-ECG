<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" fill="#0a0a0a"/>
  <!-- Stylised E / ECG mark: three horizontal bars -->
  <!-- Top bar (full width) -->
  <rect x="12" y="16" width="38" height="6" fill="#f8f8f6"/>
  <!-- Middle bar (shorter, blue accent) -->
  <rect x="12" y="29" width="24" height="6" fill="#2b4eff"/>
  <!-- Bottom bar (full width) -->
  <rect x="12" y="42" width="38" height="6" fill="#f8f8f6"/>
</svg>
